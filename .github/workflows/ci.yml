name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: human_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run migrations
        env:
          HUMAN_SERVICE_DATABASE_URL: postgresql://test:test@localhost:5432/human_test
        run: npx drizzle-kit migrate

      - name: Run tests
        env:
          HUMAN_SERVICE_DATABASE_URL: postgresql://test:test@localhost:5432/human_test
          HUMAN_SERVICE_API_KEY: test-api-key
        run: npm test
